<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B — Paper &amp; Ink</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

.slide {
  width: 100vw; height: 100vh; height: 100dvh;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  background: #faf9f7;
  position: relative;
}

/* Subtle texture lines */
.slide::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 28px, rgba(180,170,155,0.15) 28px, rgba(180,170,155,0.15) 29px
  );
  pointer-events: none;
}

/* Crimson vertical rule on left */
.left-rule {
  position: absolute; left: clamp(2.5rem,6vw,5rem); top: 0; bottom: 0;
  width: 2px; background: #c41e3a; opacity: 0.7;
}

/* Decorative top rule */
.top-rule {
  position: absolute; top: clamp(1.5rem,4vh,3.5rem);
  left: clamp(2.5rem,6vw,5rem); right: clamp(2.5rem,6vw,5rem);
  height: 1px; background: #1a1a1a; opacity: 0.12;
  transform-origin: left; transform: scaleX(0);
  animation: lineExpand 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
}
.bottom-rule {
  position: absolute; bottom: clamp(1.5rem,4vh,3.5rem);
  left: clamp(2.5rem,6vw,5rem); right: clamp(2.5rem,6vw,5rem);
  height: 1px; background: #1a1a1a; opacity: 0.12;
  transform-origin: left; transform: scaleX(0);
  animation: lineExpand 0.8s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
}

/* Page number corner */
.page-num {
  position: absolute; top: clamp(1rem,2.5vh,2rem); right: clamp(2.5rem,6vw,5rem);
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: clamp(0.6rem,0.9vw,0.75rem); font-weight: 300;
  letter-spacing: 0.1em; color: #aaa;
  opacity: 0; animation: fadeIn 0.5s ease 0.9s forwards;
}

/* Content */
.content {
  position: relative; z-index: 2;
  padding-left: clamp(4rem,10vw,8rem);
  padding-right: clamp(2.5rem,6vw,5rem);
  max-width: min(90vw, 960px);
}

/* Drop cap style label */
.label {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: clamp(0.6rem,0.9vw,0.75rem);
  font-weight: 300; letter-spacing: 0.22em;
  text-transform: uppercase; color: #c41e3a;
  margin-bottom: clamp(0.6rem,2vh,1.2rem);
  opacity: 0; animation: fadeUp 0.5s ease 0.3s forwards;
}

/* Pull quote style title */
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(2rem,5.5vw,4.5rem);
  font-weight: 600; line-height: 1.08;
  color: #1a1a1a; letter-spacing: -0.01em;
  margin-bottom: clamp(0.4rem,1.5vh,1rem);
  opacity: 0; animation: fadeUp 0.7s ease 0.45s forwards;
}
h1 em { font-style: italic; font-weight: 400; color: #c41e3a; }

/* Elegant pull-quote rule */
.pull-rule {
  display: flex; align-items: center; gap: 12px;
  margin: clamp(0.8rem,2.5vh,1.8rem) 0;
  opacity: 0; animation: fadeIn 0.5s ease 0.7s forwards;
}
.pull-rule::before, .pull-rule::after {
  content: ''; flex: 1; height: 1px; background: #1a1a1a; opacity: 0.2;
}
.pull-rule span {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.8rem,1.2vw,1rem);
  font-style: italic; color: #888;
  white-space: nowrap;
}

/* Body text */
.body {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: clamp(0.85rem,1.5vw,1.15rem);
  font-weight: 300; line-height: 1.75; color: #333;
  max-width: 58ch;
  opacity: 0; animation: fadeUp 0.5s ease 0.85s forwards;
}
.body strong { font-weight: 400; color: #1a1a1a; }

/* Style label */
.style-tag {
  position: absolute; bottom: clamp(1rem,2.5vh,2rem); right: clamp(2.5rem,6vw,5rem);
  font-family: 'Source Serif 4', serif; font-size: clamp(0.55rem,0.8vw,0.7rem);
  font-style: italic; color: #bbb;
  opacity: 0; animation: fadeIn 0.5s ease 1.1s forwards;
}

.label, .body { transform: translateY(8px); }
h1 { transform: translateY(12px); }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { to { opacity:1; } }
@keyframes lineExpand { to { transform: scaleX(1); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="slide">
  <div class="top-rule"></div>
  <div class="bottom-rule"></div>
  <div class="left-rule"></div>
  <div class="page-num">I.</div>
  <div class="style-tag">Style B — Paper &amp; Ink</div>
  <div class="content">
    <div class="label">A Tutorial · Fibaro HC3 · EventRunner</div>
    <h1>Writing<br><em>EventScript</em><br>Rules</h1>
    <div class="pull-rule"><span>condition → action</span></div>
    <p class="body">A thoughtful guide to home automation logic. From daily time triggers and device events to complex event sequences — written clearly for every skill level.</p>
  </div>
</div>
</body>
</html>
