<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style C — Swiss Modern</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,700;0,800;1,400&family=Nunito:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

.slide {
  width: 100vw; height: 100vh; height: 100dvh;
  overflow: hidden; display: grid;
  grid-template-columns: clamp(6rem,14vw,160px) 1fr clamp(4rem,8vw,100px);
  grid-template-rows: clamp(3rem,8vh,80px) 1fr clamp(3rem,8vh,80px);
  background: #ffffff; position: relative;
}

/* Visible grid lines — the Bauhaus signature */
.grid-v1 {
  position: absolute;
  left: clamp(6rem,14vw,160px); top: 0; bottom: 0;
  width: 1px; background: #1a1a1a;
  transform-origin: top; transform: scaleY(0);
  animation: lineDown 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}
.grid-v2 {
  position: absolute;
  right: clamp(4rem,8vw,100px); top: 0; bottom: 0;
  width: 1px; background: #1a1a1a;
  transform-origin: top; transform: scaleY(0);
  animation: lineDown 0.6s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
}
.grid-h1 {
  position: absolute;
  left: 0; right: 0; top: clamp(3rem,8vh,80px);
  height: 1px; background: #1a1a1a;
  transform-origin: left; transform: scaleX(0);
  animation: lineRight 0.6s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}
.grid-h2 {
  position: absolute;
  left: 0; right: 0; bottom: clamp(3rem,8vh,80px);
  height: 1px; background: #1a1a1a;
  transform-origin: left; transform: scaleX(0);
  animation: lineRight 0.6s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
}

/* Red accent block — Swiss signature */
.red-block {
  position: absolute;
  left: 0; top: clamp(3rem,8vh,80px);
  width: clamp(6rem,14vw,160px);
  height: clamp(3rem,8vh,80px);
  background: #ff3300;
  opacity: 0; animation: blockIn 0.4s ease 0.5s forwards;
}

/* Number in left column */
.num {
  position: absolute;
  left: 0; bottom: clamp(3rem,8vh,80px);
  width: clamp(6rem,14vw,160px);
  height: calc(100vh - 2 * clamp(3rem,8vh,80px));
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: center; padding-bottom: clamp(0.8rem,2vh,1.5rem);
}
.num span {
  font-family: 'Archivo', sans-serif;
  font-size: clamp(4rem,12vw,11rem); font-weight: 800;
  color: #1a1a1a; line-height: 1; opacity: 0.07;
  transform: rotate(-90deg);
  opacity: 0; animation: fadeIn 0.5s ease 0.9s forwards;
  letter-spacing: -0.04em;
}

/* Main content */
.content {
  grid-column: 2; grid-row: 2;
  display: flex; flex-direction: column; justify-content: center;
  padding: clamp(1rem,3vw,2.5rem) clamp(1.5rem,4vw,3rem);
}

.eyebrow {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.6rem,0.9vw,0.75rem);
  font-weight: 500; letter-spacing: 0.2em;
  text-transform: uppercase; color: #ff3300;
  margin-bottom: clamp(0.5rem,1.5vh,1rem);
  opacity: 0; animation: slideIn 0.4s ease 0.6s forwards;
}

h1 {
  font-family: 'Archivo', sans-serif;
  font-size: clamp(1.8rem,5.5vw,4.2rem);
  font-weight: 800; line-height: 0.95;
  color: #1a1a1a; text-transform: uppercase;
  letter-spacing: -0.02em;
  margin-bottom: clamp(0.6rem,2vh,1.4rem);
  opacity: 0; animation: slideIn 0.5s ease 0.7s forwards;
}
h1 .strike { text-decoration: none; position: relative; }
h1 .strike::after {
  content: ''; position: absolute;
  left: 0; right: 0; top: 52%;
  height: 5px; background: #ff3300;
}

.body {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.8rem,1.3vw,1rem);
  font-weight: 400; line-height: 1.6; color: #444;
  max-width: 46ch;
  opacity: 0; animation: slideIn 0.5s ease 0.85s forwards;
}

/* Top-right cell: style label */
.top-right {
  position: absolute;
  right: 0; top: 0;
  width: clamp(4rem,8vw,100px); height: clamp(3rem,8vh,80px);
  display: flex; align-items: center; justify-content: center;
}
.top-right span {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.5rem,0.7vw,0.65rem);
  writing-mode: vertical-rl; transform: rotate(180deg);
  letter-spacing: 0.12em; text-transform: uppercase; color: #bbb;
  opacity: 0; animation: fadeIn 0.5s ease 1.1s forwards;
}

/* Bottom labels */
.bottom-left {
  position: absolute; left: 0; bottom: 0;
  width: clamp(6rem,14vw,160px); height: clamp(3rem,8vh,80px);
  display: flex; align-items: center; justify-content: center;
}
.bottom-left span {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.55rem,0.8vw,0.68rem);
  letter-spacing: 0.1em; text-transform: uppercase; color: #bbb;
  opacity: 0; animation: fadeIn 0.5s ease 1s forwards;
}

.eyebrow, .body { transform: translateX(-10px); }
h1 { transform: translateX(-16px); }
@keyframes slideIn { to { opacity:1; transform:translateX(0); } }
@keyframes fadeIn { to { opacity:0.07; } }
.top-right span, .bottom-left span { opacity: 0; }
@keyframes fadeIn { to { opacity:1; } }
@keyframes lineDown { to { transform: scaleY(1); } }
@keyframes lineRight { to { transform: scaleX(1); } }
@keyframes blockIn { to { opacity: 1; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="slide">
  <div class="grid-v1"></div>
  <div class="grid-v2"></div>
  <div class="grid-h1"></div>
  <div class="grid-h2"></div>
  <div class="red-block"></div>
  <div class="num"><span>01</span></div>
  <div class="content">
    <div class="eyebrow">Fibaro HC3 · EventRunner</div>
    <h1>Event<br>Script<br>Rules</h1>
    <p class="body">A precise, structured tutorial on writing home automation rules — triggers, actions, events, and patterns.</p>
  </div>
  <div class="top-right"><span>Style C — Swiss Modern</span></div>
  <div class="bottom-left"><span>Tutorial</span></div>
</div>
</body>
</html>
